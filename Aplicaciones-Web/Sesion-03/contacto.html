<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto</title>

    <link rel="stylesheet" href="estilos.css">

    <style>
        #resultado {
            margin-top: 20px;
            text-align: center;
            font-weight: bold;
            font-size: 18px;
        }

        .success {
            color: green;
        }

        .error {
            color: red;
        }
    </style>

</head>

<body>

    <nav>
        <a href="index.html">Inicio</a>
        <a href="proyectos.html">Proyectos</a>
        <a href="grados.html">Grados Académicos</a>
        <a href="contacto.html">Contacto</a>
        <a href="quiz.html">Mini Quiz</a>
    </nav>

    <div class="contenedor">

        <h1>Contacto</h1>

        <p>
            ¿Tienes alguna duda o propuesta? Escríbeme a través de este formulario:
        </p>

        <form id="contactForm">

            <label for="nombre">Nombre completo:</label>
            <input type="text" id="nombre" name="nombre" placeholder="Tu nombre" required>

            <label for="email">Correo electrónico:</label>
            <input type="email" id="email" name="email" placeholder="ejemplo@correo.com" required>

            <label for="mensaje">Mensaje:</label>

            <textarea id="mensaje" name="mensaje" rows="5" placeholder="Escribe aquí tu mensaje..." required></textarea>

            <button type="submit">
                Enviar mensaje
            </button>

            <div id="resultado"></div>

        </form>

    </div>

    <script>
        const form = document.getElementById("contactForm");
        const resultado = document.getElementById("resultado");

        form.addEventListener("submit", function (e) {
            e.preventDefault();

            const nombre = document.getElementById("nombre").value.trim();
            const email = document.getElementById("email").value.trim();
            const mensaje = document.getElementById("mensaje").value.trim();

            if (nombre === "" || email === "" || mensaje === "") {
                resultado.innerHTML = "❌ Error: completa todos los campos correctamente.";
                resultado.className = "error";
                return;
            }

            // Simulated success
            resultado.innerHTML = "✅ Mensaje enviado correctamente.";
            resultado.className = "success";

            // Clear the form
            form.reset();
        });
    </script>

</body>

</html>
